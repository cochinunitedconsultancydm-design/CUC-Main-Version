version: 1
frontend:
  phases:
    preBuild:
      commands:
        - if [ ! -d "flutter" ]; then git clone https://github.com/flutter/flutter.git -b stable; fi
        - export PATH="$PATH:`pwd`/flutter/bin"
        - flutter clean
        - flutter pub get
    build:
      commands:
        - export PATH="$PATH:`pwd`/flutter/bin"
        - flutter build web --release
  artifacts:
    baseDirectory: build/web
    files:
      - '**/*'
  cache:
    paths:
      - "flutter/**/*"
      - ".pub-cache/**/*"
