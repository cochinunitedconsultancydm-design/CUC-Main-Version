version: 1
frontend:
  phases:
    preBuild:
      commands:
        # Download the pre-built stable version of Flutter (bypasses slow Dart SDK download)
        - if command -v yum &> /dev/null; then yum install -y xz; elif command -v apt-get &> /dev/null; then apt-get update && apt-get install -y xz-utils; fi
        - wget -q https://storage.googleapis.com/flutter_infra_release/releases/stable/linux/flutter_linux_3.44.2-stable.tar.xz -O flutter.tar.xz
        - tar -xf flutter.tar.xz
        - export PATH="$PATH:`pwd`/flutter/bin"
        # Optional: enable web just to be sure
        - flutter config --enable-web
        - flutter pub get
    build:
      commands:
        # Build the Flutter web app
        - flutter build web
  artifacts:
    # Tell Amplify where the compiled web files are
    baseDirectory: build/web
    files:
      - '**/*'
  cache:
    paths:
      - .pub-cache/**/*
      - flutter/**/*
